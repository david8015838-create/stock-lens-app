<script>
  // ── Constants ──────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'stock-lens-v1';

  const DEFAULT_HOLDINGS = [
    { id: 'aapl', ticker: 'AAPL', name: 'Apple Inc.', shares: 42, avgCost: 145.20 },
    { id: 'tsla', ticker: 'TSLA', name: 'Tesla, Inc.', shares: 15, avgCost: 210.00 },
    { id: 'nvda', ticker: 'NVDA', name: 'NVIDIA Corp.', shares: 25, avgCost: 450.00 },
    { id: 'msft', ticker: 'MSFT', name: 'Microsoft Corp.', shares: 50, avgCost: 320.45 },
    { id: 'amzn', ticker: 'AMZN', name: 'Amazon.com, Inc.', shares: 30, avgCost: 160.00 },
  ];

  const MARKET_SYMBOLS = [
    { key: '^GSPC', label: 'S&P 500',  id: 'market-gspc', prefix: '' },
    { key: '^IXIC', label: 'NASDAQ',   id: 'market-ixic', prefix: '' },
    { key: 'BTC-USD', label: 'BTC/USD', id: 'market-btc', prefix: '$' },
    { key: '^VIX',  label: 'VIX',      id: 'market-vix', prefix: '' },
  ];

  // ── State ──────────────────────────────────────────────────────────────────
  let holdings = [];
  let prices = {};
  let deleteTargetId = null;

  // ── Storage ────────────────────────────────────────────────────────────────
  function loadHoldings() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      holdings = raw ? JSON.parse(raw) : DEFAULT_HOLDINGS.map(h => ({ ...h }));
    } catch {
      holdings = DEFAULT_HOLDINGS.map(h => ({ ...h }));
    }
    if (!Array.isArray(holdings) || !holdings.length) {
      holdings = DEFAULT_HOLDINGS.map(h => ({ ...h }));
    }
  }

  function saveHoldings() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(holdings));
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  // ── CRUD ───────────────────────────────────────────────────────────────────
  function upsertHolding({ ticker, name, shares, avgCost }) {
    const upper = ticker.toUpperCase();
    const idx = holdings.findIndex(h => h.ticker === upper);
    if (idx >= 0) {
      const h = holdings[idx];
      const totalShares = h.shares + shares;
      const newAvg = ((h.shares * h.avgCost) + (shares * avgCost)) / totalShares;
      holdings = holdings.map((item, i) =>
        i === idx ? { ...item, shares: totalShares, avgCost: newAvg, name: name || item.name } : item
      );
    } else {
      holdings = [...holdings, { id: genId(), ticker: upper, name: name || upper, shares, avgCost }];
    }
    saveHoldings();
  }

  function removeHolding(id) {
    holdings = holdings.filter(h => h.id !== id);
    saveHoldings();
  }

  // ── API ────────────────────────────────────────────────────────────────────
  async function fetchPrices(tickers) {
    if (!tickers.length) return {};
    try {
      const r = await fetch(`/api/stock?symbols=${encodeURIComponent(tickers.join(','))}`);
      const { results = [] } = await r.json();
      const map = {};
      for (const item of results) {
        map[item.rawTicker] = item;
      }
      return map;
    } catch {
      return {};
    }
  }

  // ── Formatting ─────────────────────────────────────────────────────────────
  const usdFmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 });

  function fmtPrice(price, currency) {
    if (price == null) return '—';
    if (!currency || currency === 'USD') return usdFmt.format(price);
    if (currency === 'TWD') return `NT$${price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtPct(val) {
    if (val == null) return '—';
    return `${val >= 0 ? '+' : ''}${val.toFixed(2)}%`;
  }

  function fmtChange(val, currency) {
    if (val == null) return '—';
    const abs = fmtPrice(Math.abs(val), currency);
    return `${val >= 0 ? '+' : '-'}${abs}`;
  }

  // ── Render: Portfolio Total ────────────────────────────────────────────────
  function renderPortfolioTotal() {
    let totalValue = 0;
    let totalCost = 0;
    let hasUSD = false;
    let hasTWD = false;

    for (const h of holdings) {
      const p = prices[h.ticker];
      if (!p || p.price == null) continue;
      if (p.currency === 'TWD') { hasTWD = true; continue; }
      totalValue += p.price * h.shares;
      totalCost += h.avgCost * h.shares;
      hasUSD = true;
    }

    const valEl = document.getElementById('portfolioValue');
    const chgEl = document.getElementById('portfolioChange');
    const twdNote = document.getElementById('twdNote');

    twdNote.classList.toggle('hidden', !hasTWD);

    if (!hasUSD) {
      valEl.textContent = hasTWD ? 'See cards below' : 'Loading…';
      chgEl.classList.add('hidden');
      return;
    }

    const gl = totalValue - totalCost;
    const glPct = totalCost > 0 ? (gl / totalCost) * 100 : 0;
    const pos = gl >= 0;

    valEl.textContent = usdFmt.format(totalValue);
    chgEl.classList.remove('hidden');
    chgEl.className = `inline-flex items-center gap-1 px-4 py-1.5 rounded-full mb-1 ${pos ? 'bg-secondary-container/20 text-secondary' : 'bg-error-container/20 text-error'}`;
    chgEl.innerHTML = `
      <span class="material-symbols-outlined text-sm font-bold">${pos ? 'arrow_upward' : 'arrow_downward'}</span>
      <span class="font-data-sm text-data-sm">${fmtChange(gl, 'USD')} / ${fmtPct(glPct)}</span>
    `;
  }

  // ── Render: Market Cards ───────────────────────────────────────────────────
  function renderMarketCards() {
    for (const m of MARKET_SYMBOLS) {
      const el = document.getElementById(m.id);
      if (!el) continue;
      const p = prices[m.key];
      const price = p?.price;
      const pct = p?.changePercent;
      const pos = pct != null ? pct >= 0 : null;
      const colorClass = pos === null ? 'text-primary' : pos ? 'text-secondary' : 'text-error';

      let priceText = '—';
      if (price != null) {
        if (m.key === 'BTC-USD') {
          priceText = usdFmt.format(price);
        } else {
          priceText = price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
      }

      el.querySelector('[data-price]').textContent = priceText;
      const pctEl = el.querySelector('[data-pct]');
      pctEl.textContent = pct != null ? fmtPct(pct) : '—';
      pctEl.className = `font-data-sm text-data-sm ${colorClass}`;
    }
  }

  // ── Render: Holdings Grid ──────────────────────────────────────────────────
  function renderHoldingsGrid() {
    const grid = document.getElementById('holdingsGrid');

    const cardHTML = holdings.map(h => {
      const p = prices[h.ticker];
      const curPrice = p?.price ?? null;
      const dailyPct = p?.changePercent ?? null;
      const currency = p?.currency || 'USD';
      const posDaily = dailyPct != null ? dailyPct >= 0 : true;

      const totalValue = curPrice != null ? curPrice * h.shares : null;
      const totalCost = h.avgCost * h.shares;
      const totalGL = totalValue != null ? totalValue - totalCost : null;
      const totalGLPct = totalGL != null && totalCost > 0 ? (totalGL / totalCost) * 100 : null;
      const posGL = totalGL != null ? totalGL >= 0 : true;

      const displayTicker = h.ticker.replace(/\.(TW|TWO)$/, '');
      const currencyBadge = currency !== 'USD' ? `<span class="text-xs text-on-surface-variant ml-1">${currency}</span>` : '';
      const unavailable = p?.error && curPrice == null;

      const priceDisplay = unavailable
        ? '<span class="text-on-surface-variant" style="font-size:13px">Unavailable</span>'
        : `${fmtPrice(curPrice, currency)}${currencyBadge}`;

      const glDisplay = totalGL != null
        ? `${totalGL >= 0 ? '+' : ''}${fmtPrice(totalGL, currency)} (${fmtPct(totalGLPct)})`
        : '—';

      return `
        <div class="bg-surface-container border border-outline-variant p-stack-lg rounded-3xl hover:border-primary transition-all duration-300 group cursor-pointer relative overflow-hidden card-hover" data-id="${h.id}">
          <button
            class="delete-btn absolute top-3 right-3 w-7 h-7 rounded-full bg-error-container text-on-error-container flex items-center justify-center z-10 hover:bg-error hover:text-on-error transition-colors"
            onclick="event.stopPropagation(); confirmDelete('${h.id}', '${displayTicker}')"
            title="Remove ${displayTicker}"
          >
            <span class="material-symbols-outlined" style="font-size:15px;line-height:1">close</span>
          </button>
          <div class="flex justify-between items-start mb-stack-md pr-8">
            <div>
              <h4 class="font-headline-md text-headline-md text-on-surface group-hover:text-primary transition-colors">${displayTicker}</h4>
              <p class="font-body-md text-body-md text-on-surface-variant truncate max-w-[140px]">${h.name}</p>
            </div>
            <div class="text-right">
              <div class="font-data-lg text-data-lg text-on-surface">${priceDisplay}</div>
              <div class="font-data-sm text-data-sm ${posDaily ? 'text-secondary' : 'text-error'}">${fmtPct(dailyPct)}</div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4 pt-stack-md border-t border-outline-variant">
            <div>
              <p class="font-label-md text-label-md text-on-surface-variant mb-1">Avg Cost</p>
              <p class="font-data-sm text-data-sm">${fmtPrice(h.avgCost, currency)}</p>
            </div>
            <div>
              <p class="font-label-md text-label-md text-on-surface-variant mb-1">Shares</p>
              <p class="font-data-sm text-data-sm">${h.shares.toLocaleString(undefined, {maximumFractionDigits: 4})}</p>
            </div>
            <div>
              <p class="font-label-md text-label-md text-on-surface-variant mb-1">Total Value</p>
              <p class="font-data-sm text-data-sm">${totalValue != null ? fmtPrice(totalValue, currency) : '—'}</p>
            </div>
            <div>
              <p class="font-label-md text-label-md text-on-surface-variant mb-1">Total G/L</p>
              <p class="font-data-sm text-data-sm ${posGL ? 'text-secondary' : 'text-error'}">${glDisplay}</p>
            </div>
          </div>
          ${curPrice != null ? `
          <div class="absolute bottom-0 right-0 p-2 opacity-0 group-hover:opacity-100 transition-opacity">
            <span class="material-symbols-outlined text-primary">${posGL ? 'trending_up' : 'trending_down'}</span>
          </div>` : ''}
        </div>
      `;
    }).join('');

    const addCard = `
      <div class="bg-surface-container border border-dashed border-outline p-stack-lg rounded-3xl hover:border-primary hover:bg-surface-container-high transition-all duration-300 cursor-pointer flex flex-col items-center justify-center text-center gap-4 group" onclick="openModal()">
        <div class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center group-hover:scale-110 transition-transform">
          <span class="material-symbols-outlined font-bold">add</span>
        </div>
        <div>
          <h4 class="font-headline-sm text-headline-sm text-on-surface">Add New Holding</h4>
          <p class="font-body-md text-body-md text-on-surface-variant">Track more assets in your lens</p>
        </div>
      </div>
    `;

    grid.innerHTML = cardHTML + addCard;

    // Hover lift effect
    grid.querySelectorAll('.card-hover').forEach(card => {
      card.addEventListener('mouseenter', () => { card.style.transform = 'translateY(-4px)'; });
      card.addEventListener('mouseleave', () => { card.style.transform = 'translateY(0)'; });
    });
  }

  // ── Refresh All Prices ─────────────────────────────────────────────────────
  async function refreshAll() {
    const btn = document.getElementById('refreshBtn');
    btn?.classList.add('animate-spin');

    const allTickers = [
      ...holdings.map(h => h.ticker),
      ...MARKET_SYMBOLS.map(m => m.key),
    ];

    try {
      const newPrices = await fetchPrices(allTickers);
      prices = { ...prices, ...newPrices };

      // Auto-update company names from Yahoo Finance
      let namesChanged = false;
      holdings = holdings.map(h => {
        const p = newPrices[h.ticker];
        if (p?.name && p.name !== h.ticker && p.name !== h.name) {
          namesChanged = true;
          return { ...h, name: p.name };
        }
        return h;
      });
      if (namesChanged) saveHoldings();

      renderPortfolioTotal();
      renderMarketCards();
      renderHoldingsGrid();

      const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('lastUpdatedText').textContent = `Live · Updated ${now}`;
      document.getElementById('lastUpdated').classList.remove('hidden');
    } finally {
      btn?.classList.remove('animate-spin');
    }
  }

  // ── Modal: Add Stock ───────────────────────────────────────────────────────
  function openModal() {
    document.getElementById('addStockModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('tickerInput').focus(), 50);
  }

  function closeModal() {
    document.getElementById('addStockModal').classList.add('hidden');
    document.body.style.overflow = '';
    document.getElementById('addStockForm').reset();
    const errEl = document.getElementById('formError');
    errEl.textContent = '';
    errEl.classList.add('hidden');
  }

  async function handleAddStock(e) {
    e.preventDefault();
    const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
    const name = document.getElementById('nameInput').value.trim();
    const shares = parseFloat(document.getElementById('sharesInput').value);
    const avgCost = parseFloat(document.getElementById('avgCostInput').value);
    const errEl = document.getElementById('formError');

    if (!ticker) {
      errEl.textContent = 'Please enter a ticker symbol.';
      errEl.classList.remove('hidden');
      return;
    }
    if (!shares || shares <= 0) {
      errEl.textContent = 'Please enter a valid number of shares.';
      errEl.classList.remove('hidden');
      return;
    }
    if (avgCost == null || isNaN(avgCost) || avgCost < 0) {
      errEl.textContent = 'Please enter a valid average cost.';
      errEl.classList.remove('hidden');
      return;
    }

    errEl.classList.add('hidden');
    upsertHolding({ ticker, name, shares, avgCost });
    closeModal();
    renderHoldingsGrid();
    renderPortfolioTotal();

    // Fetch price + name for the new ticker
    const newPrices = await fetchPrices([ticker]);
    prices = { ...prices, ...newPrices };
    if (newPrices[ticker]?.name && newPrices[ticker].name !== ticker) {
      holdings = holdings.map(h =>
        h.ticker === ticker && h.name === ticker ? { ...h, name: newPrices[ticker].name } : h
      );
      saveHoldings();
    }
    renderHoldingsGrid();
    renderPortfolioTotal();
  }

  // ── Modal: Delete Confirm ──────────────────────────────────────────────────
  function confirmDelete(id, ticker) {
    deleteTargetId = id;
    document.getElementById('deleteDesc').textContent = `This will remove ${ticker} from your portfolio.`;
    document.getElementById('deleteModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function cancelDelete() {
    deleteTargetId = null;
    document.getElementById('deleteModal').classList.add('hidden');
    document.body.style.overflow = '';
  }

  function confirmDeleteAction() {
    if (deleteTargetId) {
      removeHolding(deleteTargetId);
      deleteTargetId = null;
    }
    document.getElementById('deleteModal').classList.add('hidden');
    document.body.style.overflow = '';
    renderHoldingsGrid();
    renderPortfolioTotal();
  }

  // ── Keyboard shortcuts ─────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); cancelDelete(); }
    if (e.key === 'r' && !e.target.closest('input, textarea')) refreshAll();
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  loadHoldings();
  renderHoldingsGrid();
  renderPortfolioTotal();
  refreshAll();

  // Auto-refresh every 60 seconds
  setInterval(refreshAll, 60_000);
</script>
</body>
</html>
